# Dummy build pipeline for configuration validation
# Replace with build-npm-packages.yml once ADO pipeline is configured

trigger: none
pr: none

parameters:
  - name: "debug"
    displayName: "Enable debug output"
    type: boolean
    default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)]
  system.debug: ${{ parameters.debug }}
  WindowsContainerImage: "onebranch.azurecr.io/windows/ltsc2022/vse2022:latest"

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    cloudvault:
      enabled: false
    globalSdl:
      asyncSdl:
        enabled: false
      tsa:
        enabled: false
      credscan:
        suppressionsFile: $(Build.SourcesDirectory)/.azure-pipelines/compliance/CredScanSuppressions.json
      policheck:
        break: true
      suppression:
        suppressionFile: $(Build.SourcesDirectory)/.config/guardian/.gdnsuppress
      codeql:
        compiled:
          enabled: false
        tsaEnabled: false
      componentgovernance:
        ignoreDirectories: $(Build.SourcesDirectory)/.vscode-test
    featureFlags:
      linuxEsrpSigning: true
      WindowsHostVersion:
        Version: 2022

    stages:
      - stage: BuildStage
        jobs:
          - job: Main
            pool:
              type: windows
            variables:
              ob_outputDirectory: '$(Build.ArtifactStagingDirectory)\build'
            steps:
              - pwsh: Write-Output "Dummy build pipeline - configuration validated successfully"
                displayName: "\U00002705 Dummy step"
