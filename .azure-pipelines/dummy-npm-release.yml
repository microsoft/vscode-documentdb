# Dummy release pipeline for configuration validation
# Replace with release-npm-packages.yml once ADO pipeline is configured

trigger: none
pr: none

parameters:
    - name: 'debug'
      displayName: 'Enable debug output'
      type: boolean
      default: false

variables:
    CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)]
    system.debug: ${{ parameters.debug }}
    TeamName: 'Desktop Tools'
    WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest'

resources:
    repositories:
        - repository: templates
          type: git
          name: OneBranch.Pipelines/GovernedTemplates
          ref: refs/heads/main

extends:
    template: v2/OneBranch.Official.CrossPlat.yml@templates
    parameters:
        cloudvault:
            enabled: false
        globalSdl:
            asyncSdl:
                enabled: false
            tsa:
                enabled: false
            credscan:
                suppressionsFile: $(Build.SourcesDirectory)/.azure-pipelines/compliance/CredScanSuppressions.json
            policheck:
                break: true
            suppression:
                suppressionFile: $(Build.SourcesDirectory)/.config/guardian/.gdnsuppress
            codeql:
                compiled:
                    enabled: false
                tsaEnabled: false
            componentgovernance:
                ignoreDirectories: $(Build.SourcesDirectory)/.vscode-test
        featureFlags:
            linuxEsrpSigning: true
            WindowsHostVersion:
                Version: 2022

        release:
            category: NonAzure

        stages:
            - stage: Release
              displayName: Dummy Release
              variables:
                  - name: ob_release_environment
                    value: Test
              jobs:
                  - job: Main
                    pool:
                        type: release
                    variables:
                        ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
                    steps:
                        - pwsh: Write-Output "Dummy release pipeline - configuration validated successfully"
                          displayName: "\U00002705 Dummy step"
